<!DOCTYPE html>
<html>
<head>
    <title>Hunt Words!</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="title-container">
        <div class="title">
            <h1>Hunt Words</h1>
        </div>
    </div>

    <div class="home-page">
        <div class="home-menu">
            <p>Welcome {{ username }}!</p>
            
            <div>
                <a href="{{ url_for('game') }}">
                    <button>Play</button>
                </a>

                <a href="{{url_for('daily_puzzle') }}">
                    <button>Daily Puzzle</button>
                </a>

                <a href="{{ url_for('profile')}}">
                <button>View Profile</button>
                </a>

                <a href="{{ url_for('leaderboard') }}">
                    <button>Leaderboard</button>
                </a>

                <a href="{{ url_for('logout') }}">
                    <button>Logout</button>
                </a>
            </div>
        </div>
    </div>
</body>

</html>
